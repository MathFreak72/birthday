<!DOCTYPE html>
<html>
  <head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>Happy Birthday</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<header>
			<h1>🎉 Happy Birthday Nirnu! 🎉</h1>
			<div class="cake">
				<div class="candles" id="candles"></div>
				<div class="icing3"></div>
				<div class="layer layer3"></div>
				<div class="icing2"></div>
				<div class="layer layer2"></div>
				<div class="icing1"></div>
				<div class="layer layer1"></div>
			</div>
		</header>
			<h2 class="timeline-title">📸 Our Memories</h2>
			<div class="timeline">
				<div class="card">
					<img src="images/jan-20.jpg">
						<h2>Jan 2020</h2>
				</div>
				<div class="card">
					<img src="images/feb-20.jpg">
						<h2>Feb 2020</h2>
				</div>
				<div class="card">
					<img src="images/may-23.jpg">
						<h2>May 2023</h2>
				</div>
				<div class="card">
					<img src="images/dec-23.jpg">
						<h2>Dec 2023</h2>
				</div>
				<div class="card">
					<img src="images/jan-24.jpg">
						<h2>Jan 2024</h2>
				</div>
				<div class="card">
					<img src="images/may-2024.jpg">
						<h2>May 2024</h2>
				</div>
				<div class="card">
					<img src="images/jan-25.jpg">
						<h2>Jan 2025</h2>
				</div>
				
			</div>
		<script src="birthday.js"></script>
	</body>
</html>
